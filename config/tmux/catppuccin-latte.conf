# --- Catppuccin Latte inspired for Ghostty ---
set -g status-style                  "bg=#eff1f5,fg=#4c4f69"
set -g status-left-length            32
set -g status-right-length           48
set -g status-justify                left
set -g status-position               top
set -g status-interval               5

# Track the active process name instead of the directory.
set -g automatic-rename              on
set -g automatic-rename-format       "#{?pane_in_mode,copy,#{b:pane_current_command}}"

# status-left: rounded session pill
set -g status-left \
  "#[bg=#eff1f5,fg=#ccd0da]#[bg=#ccd0da,fg=#4c4f69,bold] #S #[bg=#eff1f5,fg=#ccd0da]"

# status-right: minimal rounded clock pill
set -g status-right ""

# window list
set -g window-status-separator       " "
set -g window-status-format \
  "#[bg=#eff1f5,fg=#dce0e8]#[bg=#dce0e8,fg=#5c5f77]#I #[fg=#4c4f69]#W#[default]#[bg=#eff1f5,fg=#dce0e8]"

set -g window-status-current-format \
  "#[bg=#eff1f5,fg=#1e66f5]#[bg=#1e66f5,fg=#eff1f5]#I #[bold]#W#[nobold]#[bg=#eff1f5,fg=#1e66f5]"

set -g window-status-activity-style  "bg=#dce0e8,fg=#4c4f69"
set -g window-status-bell-style      "bg=#fe640b,fg=#eff1f5,bold"

# pane borders
set -g pane-border-style             "fg=#ccd0da"
set -g pane-active-border-style      "fg=#1e66f5"

# message / command prompt
set -g message-style                 "bg=#e6e9ef,fg=#4c4f69"
set -g message-command-style         "bg=#e6e9ef,fg=#1e66f5"

# copy mode
set -g mode-style                    "bg=#dce0e8,fg=#4c4f69"

# popup
bind -n M-t if-shell -F '#{==:#{session_name},popup}' \
  'detach-client' \
  'display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "tmux new-session -A -s popup"'
