# prefix config
unbind C-b
set-option -g prefix C-s
bind C-s send-prefix

# windows operation
bind -r C-k new-window -c "#{pane_current_path}"
bind -r C-h previous-window
bind -r C-l next-window
bind -r C-j kill-window

# pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# pane operation
bind -r C-q kill-pane
bind -r C-o select-pane -t :.+
bind -r C-y select-pane -t :.-
bind -r C-u split-window -h -c "#{pane_current_path}"
bind -r C-i split-window -v -c "#{pane_current_path}"

# enable mouse scrolling
set -g mouse on

# allow terminal image protocols through tmux, needed by mdmath.nvim
set -g allow-passthrough on

# copu-mode config
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi C-[ send -X cancel

# appearance
set -g status-justify left
set -g status-position top
set -g status-left-length 100
set -g status-right-length 100
set -g window-status-separator " "
set -g automatic-rename on
set -g automatic-rename-format "#{?pane_in_mode,copy,#{b:pane_current_command}}"

# plugins
set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.tmux/plugins/"
set -g @plugin 'Nybkox/tmux-ukiyo'
set -g @plugin 'tmux-plugins/tpm'

# theme
set -g @ukiyo-left-icon session
set -g @ukiyo-plugins "none"
run-shell "~/.dotfiles/config/tmux/apply-theme.sh auto"
set-hook -g client-dark-theme 'run-shell "~/.dotfiles/config/tmux/apply-theme.sh dark"'
set-hook -g client-light-theme 'run-shell "~/.dotfiles/config/tmux/apply-theme.sh light"'

if-shell "test ! -d ~/.tmux/plugins/tpm" \
  "run-shell 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"
run '~/.tmux/plugins/tpm/tpm'
