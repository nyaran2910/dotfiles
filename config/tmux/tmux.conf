# prefix config
unbind C-b
set-option -g prefix C-s
bind C-s send-prefix

# windows operation
bind -r C-k new-window -c "#{pane_current_path}"
bind -r C-h previous-window
bind -r C-l next-window
bind -r C-j kill-window

# pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# pane operation
bind -r C-q kill-pane
bind -r C-o select-pane -t :.+
bind -r C-y select-pane -t :.-
bind -r C-u split-window -h -c "#{pane_current_path}"
bind -r C-i split-window -v -c "#{pane_current_path}"

# enable mouse scrolling
set -g mouse on

# copu-mode config
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
setw -g mode-style "fg=black,bg=yellow"
bind -T copy-mode-vi C-[ send -X cancel

# appearance for kanagawa-wave theme
set -g status-style                  "bg=default,fg=#DCD7BA"
set -g status-left-length            32
set -g status-right-length           48
set -g status-justify                left
set -g status-position               top
set -g status-interval               5

# Track the active process name instead of the directory.
set -g automatic-rename              on
set -g automatic-rename-format       "#{?pane_in_mode,copy,#{b:pane_current_command}}"

# status-left: rounded session pill
set -g status-left \
  "#[bg=default,fg=#363646]#[bg=#363646,fg=#DCD7BA,bold] #S #[bg=default,fg=#363646]"

# status-right: minimal rounded clock pill
set -g status-right ""

# window list
set -g window-status-separator       " "
set -g window-status-format \
  "#[bg=default,fg=#2A2A37]#[bg=#2A2A37,fg=#938AA9]#I #[fg=#C8C093]#W#[default]#[bg=default,fg=#2A2A37]"

set -g window-status-current-format \
  "#[bg=default,fg=#7E9CD8]#[bg=#7E9CD8,fg=#1F1F28]#I #[bold]#W#[nobold]#[bg=default,fg=#7E9CD8]"

set -g window-status-activity-style  "bg=#2A2A37,fg=#DCD7BA"
set -g window-status-bell-style      "bg=#FF5D62,fg=#1F1F28,bold"

# pane borders
set -g pane-border-style             "fg=#363646"
set -g pane-active-border-style      "fg=#7E9CD8"

# message / command prompt
set -g message-style                 "bg=#2A2A37,fg=#DCD7BA"
set -g message-command-style         "bg=#2A2A37,fg=#7E9CD8"

# copy mode
set -g mode-style                    "bg=#C0A36E,fg=#1F1F28,bold"

# popup
bind -n M-t if-shell -F '#{==:#{session_name},popup}' \
  'detach-client' \
  'display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "tmux new-session -A -s popup"'
