# status bar base
set -g status-style                  "bg=#282c34,fg=#c8d3df"
set -g status-left-length            32
set -g status-right-length           48
set -g status-justify                left
set -g status-position               top
set -g status-interval               5

# Track the active process name instead of the directory.
set -g automatic-rename              on
set -g automatic-rename-format       "#{?pane_in_mode,copy,#{b:pane_current_command}}"

# status-left: rounded session pill
set -g status-left \
  "#[bg=#282c34,fg=#19212b]#[bg=#19212b,fg=#c8d3df,bold] #S #[bg=#282c34,fg=#19212b]"

# status-right: minimal rounded clock pill
set -g status-right \
  "#[bg=#282c34,fg=#19212b]#[bg=#19212b,fg=#7f93a8] %a %H:%M #[bg=#282c34,fg=#19212b]"

# window list
set -g window-status-separator       " "
set -g window-status-format \
  "#[bg=#282c34,fg=#243140]#[bg=#243140,fg=#7f93a8]#I #[fg=#c8d3df]#W#[default]#[bg=#282c34,fg=#243140]"

set -g window-status-current-format \
  "#[bg=#282c34,fg=#8aadf4]#[bg=#8aadf4,fg=#282c34]#I #[bold]#W#[nobold]#[bg=#282c34,fg=#8aadf4]"

set -g window-status-activity-style  "bg=#243140,fg=#c8d3df"
set -g window-status-bell-style      "bg=#f5a97f,fg=#282c34,bold"

# pane borders
set -g pane-border-style             "fg=#243140"
set -g pane-active-border-style      "fg=#8aadf4"

# message / command prompt
set -g message-style                 "bg=#19212b,fg=#c8d3df"
set -g message-command-style         "bg=#19212b,fg=#8aadf4"

# copy mode
set -g mode-style                    "bg=#243140,fg=#c8d3df"

# ポップアップ設定
bind -n M-t if-shell -F '#{==:#{session_name},popup}' \
  'detach-client' \
  'display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "tmux new-session -A -s popup"'
