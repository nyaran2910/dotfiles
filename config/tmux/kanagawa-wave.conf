# --- Kanagawa Wave for Ghostty ---
# sumiInk3  = #363646  (status bg)
# sumiInk4  = #54546D  (inactive window bg)
# sumiInk6  = #727169  (subtext)
# fujiWhite = #DCD7BA  (default fg)
# oldWhite  = #C8C093  (dim fg)
# crystalBlue = #7E9CD8 (accent blue)
# springBlue  = #7FB4CA (softer blue)
# waveAqua2   = #7AA89F (teal)
# peachRed    = #FF5D62 (bell)
# boatYellow2 = #C0A36E (warning)
# status bar base
set -g status-style                  "bg=#363646,fg=#DCD7BA"
set -g status-left-length            32
set -g status-right-length           48
set -g status-justify                left
set -g status-position               top
set -g status-interval               5
# Track the active process name instead of the directory.
set -g automatic-rename              on
set -g automatic-rename-format       "#{?pane_in_mode,copy,#{b:pane_current_command}}"
# status-left: rounded session pill
set -g status-left \
  "#[bg=#363646,fg=#54546D]#[bg=#54546D,fg=#DCD7BA,bold] #S #[bg=#363646,fg=#54546D]"
# status-right: minimal rounded clock pill
set -g status-right ""
# window list
set -g window-status-separator       " "
set -g window-status-format \
  "#[bg=#363646,fg=#54546D]#[bg=#54546D,fg=#727169]#I #[fg=#C8C093]#W#[default]#[bg=#363646,fg=#54546D]"
set -g window-status-current-format \
  "#[bg=#363646,fg=#7E9CD8]#[bg=#7E9CD8,fg=#1F1F28]#I #[bold]#W#[nobold]#[bg=#363646,fg=#7E9CD8]"
set -g window-status-activity-style  "bg=#54546D,fg=#DCD7BA"
set -g window-status-bell-style      "bg=#FF5D62,fg=#1F1F28,bold"
# pane borders
set -g pane-border-style             "fg=#54546D"
set -g pane-active-border-style      "fg=#7E9CD8"
# message / command prompt
set -g message-style                 "bg=#363646,fg=#DCD7BA"
set -g message-command-style         "bg=#363646,fg=#7E9CD8"
# copy mode
set -g mode-style                    "bg=#54546D,fg=#DCD7BA"
# popup
bind -n M-t if-shell -F '#{==:#{session_name},popup}' \
  'detach-client' \
  'display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "tmux new-session -A -s popup"'
